# =============================================================================
# ShadowHive — Nginx Production Configuration
# =============================================================================
#
# Two modes are provided. Uncomment the one you need.
#   Option A — TLS (recommended for internet-facing)
#   Option B — Plain HTTP (internal / lab use only)
#
# Security hardening applied to both:
#   - No server tokens (version disclosure)
#   - Strict security headers (HSTS, CSP, X-Frame-Options, etc.)
#   - Rate limiting on API endpoints
#   - Body size limits to prevent abuse
#   - No direct access to internal services (Postgres, Neo4j, Ollama)
#   - CORS restricted to single origin
#
# =============================================================================

upstream shadowhive_api {
    server api:8000;
}

upstream shadowhive_frontend {
    server frontend:3000;
}

upstream shadowhive_portal {
    server portal:8001;
}

# Rate limit zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=generate:10m rate=2r/m;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ─────────────────────────────────────────────────────────────────────────────
# Option A — TLS (recommended)
# ─────────────────────────────────────────────────────────────────────────────
# Generate certificates first:
#   nginx + certbot:  certbot certonly --nginx -d your-domain.com
#   Caddy:            handled automatically (see DEPLOYMENT.md)
#
# server {
#     listen 443 ssl http2;
#     listen [::]:443 ssl http2;
#     server_name your-domain.com;
#
#     # TLS hardening — TLS 1.3 only with modern ciphers
#     ssl_protocols TLSv1.3;
#     ssl_ciphers TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256;
#     ssl_prefer_server_ciphers off;
#     ssl_session_timeout 1d;
#     ssl_session_cache shared:SSL:10m;
#     ssl_session_tickets off;
#
#     # Certificates (Let's Encrypt example)
#     ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
#     ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
#
#     # HSTS — tell browsers to always use HTTPS
#     add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
#
#     include /etc/nginx/conf.d/shadowhive-common.conf;
# }
#
# # Redirect HTTP → HTTPS
# server {
#     listen 80;
#     listen [::]:80;
#     server_name your-domain.com;
#     return 301 https://$host$request_uri;
# }

# ─────────────────────────────────────────────────────────────────────────────
# Option B — Plain HTTP (internal / lab use only)
# ─────────────────────────────────────────────────────────────────────────────

# Portal — public-facing honeypot website (default catch-all)
server {
    listen 80;
    listen [::]:80;
    server_name _;

    server_tokens off;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    client_max_body_size 10m;

    proxy_connect_timeout 15s;
    proxy_read_timeout 120s;
    proxy_send_timeout 30s;
    proxy_buffering off;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location / {
        proxy_pass http://shadowhive_portal;
    }

    access_log /var/log/nginx/portal-access.log;
    error_log /var/log/nginx/portal-error.log;
}

# Admin dashboard — restricted access
server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    server_tokens off;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' http://localhost:8000; frame-ancestors 'none';" always;

    client_max_body_size 10m;

    proxy_connect_timeout 15s;
    proxy_read_timeout 120s;
    proxy_send_timeout 30s;
    proxy_buffering off;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location / {
        proxy_pass http://shadowhive_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /_next/webpack-hmr {
        proxy_pass http://shadowhive_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /api/ {
        proxy_pass http://shadowhive_api;
        proxy_http_version 1.1;
    }

    location /_next/static {
        proxy_pass http://shadowhive_frontend;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }
    location /static {
        proxy_pass http://shadowhive_frontend;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    location /api/companies/health {
        limit_req off;
        proxy_pass http://shadowhive_api;
    }

    location /neo4j/ { deny all; return 404; }
    location /ollama/ { deny all; return 404; }

    access_log /var/log/nginx/admin-access.log;
    error_log /var/log/nginx/admin-error.log;
}


