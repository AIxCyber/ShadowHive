# =============================================================================
# ShadowHive — Production Docker Compose Override
# =============================================================================
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# With GPU:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.gpu.yml up -d
#
# With nginx reverse proxy:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.nginx.yml up -d
#
# =============================================================================

services:
  api:
    build:
      target: prod
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./configs:/app/configs:ro
    environment:
      - SERVER_DEBUG=false
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    restart: always
    stop_grace_period: 30s
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    read_only: true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  frontend:
    build:
      target: prod
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
    volumes: []
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  postgres:
    ports:
      - "127.0.0.1:5432:5432"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
        reservations:
          memory: 256M
    restart: always
    volumes:
      - pgdata:/var/lib/postgresql/data
    labels:
      backup.description: "PostgreSQL data directory — backup with pg_dump"
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  neo4j:
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          memory: 512M
    restart: always
    labels:
      backup.description: "Neo4j graph data — backup with cypher-shell dump"
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  ollama:
    ports:
      - "127.0.0.1:11434:11434"
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G
        reservations:
          cpus: "1"
          memory: 4G
    restart: always
    labels:
      backup.description: "Ollama models directory — backup /root/.ollama"
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  cowrie:
    ports:
      - "2222:2222"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080')"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    restart: always
    labels:
      backup.description: "Cowrie honeypot data — session logs, downloads, keys"
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  portal:
    ports:
      - "127.0.0.1:8001:8001"
    environment:
      - PORTAL_ADMIN_PASSWORD=${PORTAL_ADMIN_PASSWORD:-}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8001/"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    read_only: true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
