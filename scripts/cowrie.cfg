# Cowrie configuration for ShadowHive integration
# Writes events to shared volume for ShadowHive ingestion

[ssh]
listen_port = 2222
listen_addr = 0.0.0.0

[auth]
userdb = /cowrie/shared/userdb.txt

[honeypot]
contents_path = /cowrie/shared/contents

[output_jsonlog]
enabled = true
logfile = /cowrie/data/cowrie.json
