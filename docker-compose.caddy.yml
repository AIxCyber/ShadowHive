# =============================================================================
# ShadowHive — Caddy Reverse Proxy (alternative to nginx)
# =============================================================================
#
# Caddy automatically provisions Let's Encrypt TLS certificates.
# Set your domain in CADDY_DOMAIN env var or in the Caddyfile.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.caddy.yml up -d
#
# =============================================================================

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    depends_on:
      api:
        condition: service_started
      frontend:
        condition: service_started
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true

volumes:
  caddydata:
  caddyconfig:
